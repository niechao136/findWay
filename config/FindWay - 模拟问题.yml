    - data:
        code: "\nfunction handleLLM(text = '') {\n  let str = text.replaceAll(/<think>[\\\
          s\\S]*?<\\/think>/g, '')\n  const blockMatch = str.match(/```json\\s*([\\\
          s\\S]*)/i)\n  let jsonPart = blockMatch ? blockMatch[1] : str\n  jsonPart\
          \ = jsonPart.replace(/```[\\s\\S]*$/, '').trim()\n  const cleanJson = jsonPart\n\
          \    .replace(/\\/\\/(?!\\s*http)[^\\n]*/g, '') // 移除单行注释\n    .replace(/\\\
          /\\*[\\s\\S]*?\\*\\//g, '')     // 移除多行注释\n    .replace(/\\xA0/g, ' ') \
          \                // 关键：修复 \\xA0 空格\n    .replace(/,\\s*([\\]}])/g, '$1')\
          \         // 关键：修复 JSON 尾随逗号\n    .trim()\n  try {\n    return JSON.parse(cleanJson)\n\
          \  } catch (e) {\n    return {}\n  }\n}\nfunction main({output}) {\n  const\
          \ simulation = []\n  const simulation_question = []\n  const simulation_index\
          \ = {}\n  Array.from(output).forEach((text, index) => {\n    const obj =\
          \ handleLLM(text)\n    const list = Array.isArray(obj?.paraphrases) ? Array.from(obj?.paraphrases)\
          \ : []\n    list.forEach(item => {\n      const query = String(item?.text\
          \ ?? '')\n      if (!!query) {\n        simulation_index[simulation.length]\
          \ = index\n        const request = {\n          inputs: {},\n          query,\n\
          \          response_mode: 'blocking',\n          conversation_id: '',\n\
          \          user: 'simulation_test',\n          files: [],\n        }\n \
          \       simulation.push(JSON.stringify(request))\n        simulation_question.push(query)\n\
          \      }\n    })\n  })\n  return {\n    simulation,\n    simulation_index,\n\
          \    simulation_question,\n  }\n}\n"
        code_language: javascript
