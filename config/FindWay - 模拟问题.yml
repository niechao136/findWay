    - data:
        code: "\nfunction handleLLM(text = '') {\n  let str = text.replaceAll(/<think>[\\\
          s\\S]*?<\\/think>/g, '')\n  const blockMatch = str.match(/```json\\s*([\\\
          s\\S]*)/i)\n  let jsonPart = blockMatch ? blockMatch[1] : str\n  jsonPart\
          \ = jsonPart.replace(/```[\\s\\S]*$/, '').trim()\n  const cleanJson = jsonPart\n\
          \    .replace(/\\/\\/(?!\\s*http)[^\\n]*/g, '') // 移除单行注释\n    .replace(/\\\
          /\\*[\\s\\S]*?\\*\\//g, '')     // 移除多行注释\n    .replace(/\\xA0/g, ' ') \
          \                // 关键：修复 \\xA0 空格\n    .replace(/,\\s*([\\]}])/g, '$1')\
          \         // 关键：修复 JSON 尾随逗号\n    .trim()\n  try {\n    return JSON.parse(cleanJson)\n\
          \  } catch (e) {\n    return {}\n  }\n}\nfunction main({output, simulation_obj})\
          \ {\n  const head = '|標準問題|標準回答|模擬問題|模擬答案|相關係數|\\n'\n  const split = '|---|---|---|---|---|\\\
          n'\n  const file = '評估報告'\n  const list = Array.from(simulation_obj)\n \
          \ let markdown = head + split\n  Array.from(output).forEach((text, index)\
          \ => {\n    const obj = handleLLM(text)\n    const item = list[index]\n\
          \    const question = String(item.question).replaceAll('\\n', ';').replaceAll('|',\
          \ '¦')\n    const answer = String(item.answer).replaceAll('\\n', ';').replaceAll('|',\
          \ '¦')\n    const simulation = String(item.simulation).replaceAll('\\n',\
          \ ';').replaceAll('|', '¦')\n    const replay = String(item.replay).replaceAll('\\\
          n', ';').replaceAll('|', '¦')\n    const score = String(obj.similarity_score).replaceAll('\\\
          n', ';').replaceAll('|', '¦')\n    markdown += `|${question}|${answer}|${simulation}|${replay}|${score}|\\\
          n`\n  })\n  return {\n    markdown,\n    file,\n  }\n}\n"
        code_language: javascript
        outputs:
          file:
            children: null
            type: string
          markdown:
            children: null
            type: string
