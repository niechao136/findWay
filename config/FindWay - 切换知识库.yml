    - data:
        code: "\nfunction parseKeyValueText(input) {\n  const result = {}\n  if (typeof\
          \ input !== 'string') return result\n  const lines = input.split(/\\r?\\\
          n/).map(line => line.trim()).filter(Boolean)\n  for (const line of lines)\
          \ {\n    // 只切第一个冒号，防止 value 中包含冒号\n    const idx = line.indexOf(':')\n\
          \    if (idx === -1) continue\n    const key = line.slice(0, idx).trim()\n\
          \    let value = line.slice(idx + 1).trim()\n    if (!key) continue\n  \
          \  result[key] = value\n  }\n  return result\n}\nfunction main({body}) {\n\
          \  const obj = JSON.parse(body)\n  const list = Array.isArray(obj?.records)\
          \ ? Array.from(obj.records).map(o => {\n    return parseKeyValueText(o.segment.content)\n\
          \  }) : []\n  const store = []\n  const check = {}\n  list.forEach(obj =>\
          \ {\n    if (check[obj.child_space_id] === undefined) {\n      check[obj.child_space_id]\
          \ = store.length\n      store.push({\n        space_id: obj.space_id,\n\
          \        space: obj.space_name,\n        child_space_id: obj.child_space_id,\n\
          \        name: obj.store_name,\n        time: obj.store_time,\n        product:\
          \ []\n      })\n    }\n    store[check[obj.child_space_id]].product.push({\n\
          \      id: obj.product_id,\n      name: obj.name,\n      price: obj.price,\n\
          \    })\n  })\n  return {\n    result: JSON.stringify(store),\n  }\n}\n"
