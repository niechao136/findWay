    - data:
        code: "\nfunction parseKeyValueText(input) {\n  const result = {}\n  if (typeof\
          \ input !== 'string') return result\n\n  const lines = input.split(/\\r?\\\
          n/).map(line => line.trim()).filter(Boolean)\n\n  for (const line of lines)\
          \ {\n    // 只切第一个冒号，防止 value 中包含冒号\n    const idx = line.indexOf(':')\n\
          \    if (idx === -1) continue\n\n    const key = line.slice(0, idx).trim()\n\
          \    let value = line.slice(idx + 1).trim()\n\n    if (!key) continue\n\n\
          \    result[key] = value\n  }\n\n  return result\n}\nfunction main({text,\
          \ body}) {\n  const res = JSON.parse(body)\n  const list = Array.from(res?.records\
          \ ?? []).map(o => {\n    return parseKeyValueText(o.segment.content)\n \
          \ })\n  const AI_reply = text.replaceAll(/<think>[\\s\\S]*?<\\/think>/g,\
          \ '')\n  const info = []\n  const check = {}\n  list.forEach(obj => {\n\
          \    if (check[obj.child_space_id] === undefined) {\n      check[obj.child_space_id]\
          \ = info.length\n      info.push({\n        space_id: obj.space_id,\n  \
          \      space: obj.space_name,\n        child_space_id: obj.child_space_id,\n\
          \        name: obj.store_name,\n        time: obj.store_time,\n        product:\
          \ []\n      })\n    }\n    info[check[obj.child_space_id]].product.push({\n\
          \      id: obj.product_id,\n      price: obj.price,\n      name: obj.name,\n\
          \    })\n  })\n  const answer = {\n    AI_reply,\n    info,\n  }\n  return\
          \ {\n    answer,\n  }\n}\n"
